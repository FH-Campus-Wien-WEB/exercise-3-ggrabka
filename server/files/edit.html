<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Movie</title>
  <script src="edit.js"></script>
  <link rel="stylesheet" href="edit.css" />
</head>

<body>
  <div class="edit-form">
    <form class="movie-form">
          <input type="hidden" id="imdbID">
      <div class="movie-title">
        <label>Title:</label>
        <input type="text" id="Title">
      </div>

      <div class="movie-released">
        <label>Released:</label>
        <input type="text" id="Released">
      </div>

      <div class="movie-runtime">
        <label>Runtime:</label>
        <input type="text" id="Runtime">
      </div>

      <div class="movie-genres">
         <label>Genres:</label>
<select id="Genres" multiple required>
  <option value="Action">Action</option>
  <option value="Adventure">Adventure</option>
  <option value="Animation">Animation</option>
  <option value="Biography">Biography</option>
  <option value="Comedy">Comedy</option>
  <option value="Crime">Crime</option>
  <option value="Documentary">Documentary</option>
  <option value="Drama">Drama</option>
  <option value="Family">Family</option>
  <option value="Fantasy">Fantasy</option>
  <option value="Film Noir">Film Noir</option>
  <option value="History">History</option>
  <option value="Horror">Horror</option>
  <option value="Music">Music</option>
  <option value="Musical">Musical</option>
  <option value="Mystery">Mystery</option>
  <option value="Romance">Romance</option>
  <option value="Sci-Fi">Sci-Fi</option>
  <option value="Short Film">Short Film</option>
  <option value="Sport">Sport</option>
  <option value="Superhero">Superhero</option>
  <option value="Thriller">Thriller</option>
  <option value="War">War</option>
  <option value="Western">Western</option>
</select>
      </div>

      <div class="movie-directors">
        <label>Directors:</label>
        <input type="text" id="Directors">
      </div>

      <div class="movie-writers">
        <label>Writers:</label>
        <input type="text" id="Writers">
      </div>

      <div class="movie-actors">
        <label>Actors:</label>
        <input type="text" id="Actors">
      </div>

      <div class="movie-plot">
        <label>Plot:</label>
        <textarea id="Plot" rows="5" required></textarea>
      </div>

      <div class="movie-poster">
        <label>Poster:</label>
        <input type="text" id="Poster">
      </div>

      <div class="movie-metascore">
        <label>Metascore:</label>
        <input type="text" id="Metascore">
      </div>

      <div class="movie-imdbRating">
        <label>IMDb Rating:</label>
        <input type="text" id="imdbRating">
      </div>
      <div class="button-area">
        <a href="index.html" index.html" type="button" class="back-btn">
          Back
        </a>
        <button class="save-btn" type="button" onclick="putMovie()">Save</button>
      </div>
    </form>

  </div>

</body>

</html>
